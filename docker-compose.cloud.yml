version: '3.8'

services:
  gpu-app:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["./gpu_partitioner", "-p", "40", "-t", "3600"]